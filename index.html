<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Office Dashboard Display</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="center"></div>
  <div id="fullscreen-btn">⛶ Fullscreen</div>
  <div id="container"></div>
  <script src="config.js"></script>
  <script>
    const { slidesFolder, slides, powerBiEmbedUrl, slideDuration } = window.dashboardConfig;
    const container = document.getElementById('container');

    // === Create Power BI iframe once ===
    const powerBiFrame = document.createElement('iframe');
    powerBiFrame.src = powerBiEmbedUrl;
    powerBiFrame.className = 'slide';
    powerBiFrame.allowFullscreen = true;
    container.appendChild(powerBiFrame);

    // === Create image slides ===
    const imageSlides = slides.map(src => {
      const img = document.createElement('img');
      img.src = `${slidesFolder}/${src}`;
      img.className = 'slide';
      container.appendChild(img);
      return img;
    });

    // === Build rotation sequence with Power BI between slides ===
    let sequence = [];
    imageSlides.forEach((img, index) => {
      sequence.push(img);
      // Add Power BI after each slide except the last one
      if (index < imageSlides.length - 1) {
        sequence.push(powerBiFrame);
      }
    });
    let i = 0;

    function showNext() {
      sequence.forEach(s => (s.style.display = 'none'));
      sequence[i].style.display = 'block';
      i = (i + 1) % sequence.length;
    }

    // Initial display
    showNext();
    setInterval(showNext, slideDuration);

    // === Fullscreen button ===
    document.getElementById('fullscreen-btn').addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    });
    
    document.onclick = function() {
      document.documentElement.requestFullscreen();
    }

  </script>
</body>
</html>
